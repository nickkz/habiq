<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IQ – Property Intelligence</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/favicon.svg') }}" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <!-- Bootstrap + Chart.js + FontAwesome -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=8" />
</head>
<body>

<!-- ── Topbar ────────────────────────────────────────────────────────────── -->
<nav class="topbar">
  <a class="topbar-brand" href="/">
    <img src="{{ url_for('static', filename='images/favicon.svg') }}" class="brand-icon" alt="IQ" />
    <span class="brand-name">IQ</span>
    <span class="brand-sub">Property Intelligence</span>
  </a>

  <div class="topbar-tag">Pocono Mountains &nbsp;·&nbsp; Multi-Family &nbsp;·&nbsp; &lt;$400K &nbsp;·&nbsp; No HOA</div>

  <div class="topbar-stats" id="stats-bar">
    <span class="stat-chip"><i class="fa fa-building"></i><span id="stat-total">–</span></span>
    <span class="stat-chip on-chip"><i class="fa fa-circle-dot"></i><span id="stat-onmarket">–</span> on-market</span>
    <span class="stat-chip off-chip"><i class="fa fa-circle"></i><span id="stat-offmarket">–</span> off-market</span>
    <span class="stat-chip"><i class="fa fa-user"></i><span id="stat-owners">–</span> w/ owner</span>
  </div>

  <div class="topbar-actions">
    <button id="map-theme-btn" class="btn btn-sm btn-outline-secondary me-1"
            onclick="HaBIQ.toggleMapTheme()">
      <i class="fa fa-sun"></i> Light Map
    </button>
    <button class="btn btn-sm btn-outline-light" onclick="HaBIQ.triggerRefresh()">
      <i class="fa fa-rotate me-1"></i>Refresh
    </button>
  </div>
</nav>

<!-- ── Body ──────────────────────────────────────────────────────────────── -->
<div class="app-body">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span><i class="fa fa-sliders me-1"></i>Filters</span>
      <span class="badge bg-primary rounded-pill" id="result-count">0</span>
    </div>

    <div class="filter-group">
      <label class="filter-label">Market</label>
      <div class="market-toggle" id="market-toggle">
        <button class="mtbtn active" data-val="">All</button>
        <button class="mtbtn" data-val="on_market">On-Market</button>
        <button class="mtbtn" data-val="off_market">Off-Market</button>
      </div>
    </div>

    <div class="filter-group">
      <label class="filter-label">Property Type</label>
      <select id="f-type" class="form-select form-select-sm">
        <option value="multi">Multi-Family</option>
        <option value="all">All Types</option>
        <option value="duplex">Duplex</option>
        <option value="triplex">Triplex</option>
        <option value="apartment">Apartment</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="filter-label">Price Range</label>
      <div class="d-flex gap-2">
        <input type="number" id="f-min-price" class="form-control form-control-sm"
               placeholder="Min $" step="10000" />
        <input type="number" id="f-max-price" class="form-control form-control-sm"
               placeholder="Max $" value="400000" step="10000" />
      </div>
    </div>

    <div class="filter-group">
      <label class="filter-label">Min Beds</label>
      <select id="f-beds" class="form-select form-select-sm">
        <option value="">Any</option>
        <option value="2">2+</option>
        <option value="4">4+</option>
        <option value="6">6+</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="filter-label">Min Annual NOI</label>
      <input type="number" id="f-min-noi" class="form-control form-control-sm"
             placeholder="e.g. 5000" step="1000" />
      <div class="filter-hint">Income − vacancy − tax − maint. − ins.</div>
    </div>

    <div class="filter-group">
      <label class="filter-label">County</label>
      <select id="f-county" class="form-select form-select-sm">
        <option value="">All Counties</option>
      </select>
    </div>

    <button class="btn btn-primary btn-sm w-100 mt-2" onclick="HaBIQ.applyFilters()">
      <i class="fa fa-magnifying-glass me-1"></i>Apply Filters
    </button>

    <hr class="my-3" />

    <div class="sidebar-header mb-2">
      <span><i class="fa fa-list me-1"></i>Properties</span>
    </div>
    <div id="property-list" class="property-list"></div>
  </aside>

  <!-- Map -->
  <div id="map"></div>

  <!-- Detail Panel -->
  <div class="detail-panel" id="detail-panel">
    <button class="detail-close" onclick="HaBIQ.closeDetail()"><i class="fa fa-xmark"></i></button>
    <div id="detail-content"></div>
  </div>

</div>

<!-- Lightbox overlay -->
<div id="lightbox" class="lightbox" onclick="HaBIQ.closeLightbox()">
  <button class="lb-close" onclick="HaBIQ.closeLightbox()"><i class="fa fa-xmark"></i></button>
  <button class="lb-prev" onclick="HaBIQ.lbNav(-1, event)"><i class="fa fa-chevron-left"></i></button>
  <img id="lb-img" src="" alt="" />
  <button class="lb-next" onclick="HaBIQ.lbNav(1, event)"><i class="fa fa-chevron-right"></i></button>
  <div id="lb-counter" class="lb-counter"></div>
</div>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="toast" class="toast align-items-center text-bg-primary border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toast-msg">Message</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="{{ url_for('static', filename='js/map.js') }}?v=8"></script>
<script>
  window.HABIQ_CONFIG = { mapLat: {{ map_lat }}, mapLng: {{ map_lng }}, mapZoom: {{ map_zoom }} };
  document.addEventListener("DOMContentLoaded", () => HaBIQ.init());
</script>
</body>
</html>
